apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quiz-frontend
  template:
    metadata:
      labels:
        app: quiz-frontend
    spec:
      containers:
        - name: quiz-frontend
          image: moneshgomo/frontend-quiz-app:dev
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_BASE_URL
              value: "http://api-gateway:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-frontend
spec:
  type: NodePort
  selector:
    app: quiz-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30090